<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HBTI 豪度测验</title>
  <style>
    :root {
      --ink: #171717;
      --paper: #fff7db;
      --cream: #f5ecd0;
      --green: #d8f35a;
      --blue: #95d4ff;
      --pink: #ffb7dc;
      --red: #ff4d2e;
      --white: #fffdf2;
      --shadow: 7px 7px 0 var(--ink);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 77, 46, .22), transparent 22rem),
        radial-gradient(circle at 86% 18%, rgba(149, 212, 255, .34), transparent 23rem),
        linear-gradient(transparent 31px, rgba(23, 23, 23, .08) 32px),
        linear-gradient(90deg, transparent 31px, rgba(23, 23, 23, .08) 32px),
        var(--cream);
      background-size: auto, auto, 32px 32px, 32px 32px, auto;
      padding: 20px;
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 10px 10px 0 var(--ink);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 4px solid var(--ink);
      background: var(--green);
      font-weight: 900;
    }

    .brand { font-size: 22px; }

    main { padding: 24px; }

    .screen { display: none; }
    .screen.active { display: block; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 22px;
      align-items: stretch;
    }

    h1 {
      margin: 0;
      font-size: clamp(54px, 10vw, 108px);
      line-height: .9;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h3 { margin: 0; font-size: 24px; }
    p { line-height: 1.65; }

    .lead {
      max-width: 620px;
      margin: 18px 0 0;
      font-size: 20px;
      font-weight: 800;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
      align-items: center;
    }

    .btn {
      border: 3px solid var(--ink);
      border-radius: 8px;
      padding: 13px 18px;
      background: var(--blue);
      font-size: 18px;
      font-weight: 900;
      box-shadow: 5px 5px 0 var(--ink);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .btn.secondary { background: var(--white); }
    .btn.danger { background: var(--red); color: white; }

    .note {
      border: 3px dashed var(--ink);
      border-radius: 8px;
      padding: 10px 12px;
      background: white;
      font-weight: 900;
      transform: rotate(-1deg);
    }

    .figure-card {
      position: relative;
      min-height: 360px;
      border: 4px solid var(--ink);
      border-radius: 12px;
      background: var(--pink);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .figure-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 23px, rgba(23, 23, 23, .12) 24px),
        linear-gradient(90deg, transparent 23px, rgba(23, 23, 23, .12) 24px);
      background-size: 24px 24px;
    }

    .figure-card.has-image .figure {
      display: none;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.08) contrast(1.05);
      z-index: 1;
    }

    .figure {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 185px;
      height: 260px;
      transform: translateX(-50%);
      border: 4px solid white;
      border-radius: 22px;
      background: #101010;
      box-shadow: 8px 8px 0 var(--ink);
    }

    .hood {
      position: absolute;
      top: 28px;
      left: 42px;
      width: 94px;
      height: 104px;
      border: 3px solid white;
      border-radius: 54px 54px 28px 28px;
      background: #202020;
    }

    .mask {
      position: absolute;
      top: 88px;
      left: 55px;
      width: 70px;
      height: 30px;
      border: 3px solid white;
      border-radius: 0 0 20px 20px;
      background: #020202;
    }

    .body {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: -10px;
      height: 140px;
      border: 3px solid white;
      border-radius: 52px 52px 0 0;
      background: #191919;
    }

    .deck {
      position: absolute;
      left: 26px;
      right: 26px;
      bottom: 32px;
      height: 26px;
      border: 3px solid white;
      border-radius: 999px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 26px;
    }

    .mini {
      min-height: 128px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      padding: 14px;
      background: white;
      box-shadow: 5px 5px 0 var(--ink);
      font-weight: 800;
    }

    .mini:nth-child(2) { background: var(--green); transform: rotate(1deg); }
    .mini:nth-child(3) { background: var(--blue); transform: rotate(-1deg); }

    .barrage-board {
      position: relative;
      min-height: 230px;
      margin-top: 26px;
      border: 4px solid var(--ink);
      border-radius: 8px;
      background:
        linear-gradient(transparent 27px, rgba(23, 23, 23, .08) 28px),
        linear-gradient(90deg, transparent 27px, rgba(23, 23, 23, .08) 28px),
        var(--white);
      background-size: 28px 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .barrage {
      position: absolute;
      left: var(--x);
      top: var(--y);
      max-width: min(460px, 86vw);
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--bg);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 4px 4px 0 var(--ink);
      transform: rotate(var(--r));
      animation: floaty 5s ease-in-out infinite;
      animation-delay: var(--d);
    }

    .barrage:nth-child(2n) { border-radius: 8px; }
    .barrage:nth-child(3n) { color: white; background: var(--red); }

    @keyframes floaty {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -7px; }
    }

    .kicker {
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 900;
      opacity: .72;
    }

    .progress-wrap {
      margin-bottom: 22px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: white;
      overflow: hidden;
    }

    .progress {
      height: 18px;
      width: 0%;
      background: var(--red);
      transition: width .22s ease;
    }

    .question-card {
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 4px solid var(--ink);
      background: var(--green);
      font-weight: 900;
    }

    .question-body { padding: 20px; }

    .question-text {
      margin: 0 0 18px;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.18;
      font-weight: 900;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 70px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      padding: 10px;
      background: var(--white);
      text-align: left;
      font-weight: 850;
      box-shadow: 4px 4px 0 var(--ink);
    }

    .option.selected {
      background: var(--blue);
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    .letter {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--pink);
      font-weight: 900;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }

    .result-layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
    }

    .score-card,
    .type-card,
    .breakdown {
      border: 4px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
    }

    .score-card {
      padding: 18px;
      background: var(--green);
    }

    .score {
      margin: 6px 0 8px;
      font-size: 92px;
      line-height: .86;
      font-weight: 900;
    }

    .score-label {
      display: inline-block;
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 7px 12px;
      background: var(--red);
      color: white;
      font-weight: 900;
    }

    .meme-art {
      position: relative;
      height: 190px;
      margin-top: 18px;
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: var(--art-bg, var(--pink));
      overflow: hidden;
    }

    .meme-art::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 19px, rgba(23, 23, 23, .12) 20px),
        linear-gradient(90deg, transparent 19px, rgba(23, 23, 23, .12) 20px);
      background-size: 20px 20px;
    }

    .art-person {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 96px;
      height: 132px;
      transform: translateX(-50%) rotate(var(--tilt, 0deg));
      border: 3px solid white;
      border-radius: 22px 22px 10px 10px;
      background: #121212;
      box-shadow: 6px 6px 0 var(--ink);
      z-index: 2;
    }

    .art-person::before {
      content: "";
      position: absolute;
      left: 25px;
      top: 18px;
      width: 42px;
      height: 48px;
      border: 3px solid white;
      border-radius: 28px 28px 14px 14px;
      background: #242424;
    }

    .art-person::after {
      content: "";
      position: absolute;
      left: 30px;
      top: 51px;
      width: 34px;
      height: 17px;
      border: 3px solid white;
      border-radius: 0 0 14px 14px;
      background: #050505;
    }

    .meme-art.has-image .art-person {
      display: none;
    }

    .meme-img {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.08) contrast(1.04);
    }

    .art-chip {
      position: absolute;
      z-index: 3;
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--green);
      font-size: 13px;
      font-weight: 900;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .art-chip.one { left: 14px; top: 16px; transform: rotate(-6deg); }
    .art-chip.two { right: 14px; top: 52px; background: var(--blue); transform: rotate(5deg); }
    .art-chip.three { left: 26px; bottom: 22px; background: var(--red); color: white; transform: rotate(4deg); }

    .type-card { overflow: hidden; }

    .type-head {
      padding: 14px 16px;
      border-bottom: 4px solid var(--ink);
      background: var(--pink);
    }

    .type-body { padding: 18px; }

    .type-code {
      display: inline-block;
      margin-bottom: 10px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--blue);
      font-weight: 900;
    }

    .type-title {
      margin: 0;
      font-size: clamp(38px, 7vw, 68px);
      line-height: .96;
      letter-spacing: 0;
    }

    .quote {
      border-left: 6px solid var(--ink);
      margin: 16px 0;
      padding-left: 12px;
      font-size: 19px;
      font-weight: 900;
    }

    .report-grid {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .report-item {
      border: 3px solid var(--ink);
      border-radius: 8px;
      padding: 12px;
      background: var(--white);
    }

    .report-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }

    .breakdown {
      grid-column: 1 / -1;
      padding: 16px;
      margin-top: 4px;
    }

    .axis-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .axis {
      border: 3px solid var(--ink);
      border-radius: 8px;
      padding: 12px;
      background: var(--white);
      font-weight: 850;
    }

    .axis strong {
      display: block;
      margin-bottom: 4px;
      font-size: 24px;
    }

    .axis-label {
      margin-bottom: 4px;
      font-size: 14px;
      opacity: .76;
    }

    .axis-meter {
      font-size: 15px;
    }

    .axis-explain {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--white);
      font-weight: 900;
    }

    .library-intro {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .library-quote {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.7;
      font-weight: 850;
    }

    .library-card {
      border: 3px solid var(--ink);
      border-radius: 8px;
      background: white;
      box-shadow: 5px 5px 0 var(--ink);
      overflow: hidden;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .library-card:hover {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .library-card .meme-art {
      height: 128px;
      margin: 0;
      border: 0;
      border-bottom: 3px solid var(--ink);
      border-radius: 0;
    }

    .library-card-body {
      padding: 12px;
    }

    .library-card h3 {
      margin: 4px 0 8px;
      font-size: 21px;
      line-height: 1.1;
    }

    .library-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
    }

    details {
      margin-top: 10px;
      border-top: 2px dashed var(--ink);
      padding-top: 8px;
      font-size: 14px;
      line-height: 1.55;
    }

    summary {
      cursor: pointer;
      font-weight: 900;
    }

    .hidden { display: none !important; }

    @media (max-width: 800px) {
      body { padding: 10px; }
      main { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .hero,
      .result-layout,
      .mini-grid,
      .axis-grid,
      .library-grid { grid-template-columns: 1fr; }
      .library-intro { flex-direction: column; }
      .barrage-board { min-height: 340px; }
      .barrage {
        left: 12px !important;
        right: 12px;
        top: var(--mobile-y);
        white-space: normal;
      }
      .figure-card { min-height: 260px; }
      .figure {
        width: 145px;
        height: 205px;
      }
      .score { font-size: 74px; }
      .nav-row { flex-direction: column; }
      .nav-row .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">HBTI 豪度测验</div>
    </header>

    <main>
      <section class="screen active" id="startScreen">
        <div class="hero">
          <div>
            <h1>测测你<br>到底有多豪</h1>
            <div class="actions">
              <button class="btn danger" id="startBtn">开始鉴定</button>
              <button class="btn secondary" id="openLibraryFromStartBtn">先看图鉴</button>
              <div class="note">别人测 MBTI，我测 HBTI</div>
            </div>
          </div>
          <div class="figure-card has-image" aria-hidden="true">
            <img class="hero-img" src="./hero-jiahao.jpg" alt="" onerror="this.hidden=true; this.parentElement.classList.remove('has-image')">
            <div class="figure">
              <div class="hood"></div>
              <div class="mask"></div>
              <div class="body"></div>
              <div class="deck"></div>
            </div>
          </div>
        </div>

        <div class="barrage-board" aria-label="嘉豪语录弹幕">
          <div class="barrage" style="--x:4%;--y:18px;--mobile-y:16px;--r:-2deg;--d:0s;--bg:var(--green)">别人：早八要迟到了　我：走廊的风在等我</div>
          <div class="barrage" style="--x:36%;--y:52px;--mobile-y:72px;--r:2deg;--d:-1s;--bg:var(--blue)">我要去操控我的基金股票</div>
          <div class="barrage" style="--x:12%;--y:96px;--mobile-y:136px;--r:1deg;--d:-2s;--bg:var(--pink)">别人：正常走路　我：无人区慢放</div>
          <div class="barrage" style="--x:54%;--y:122px;--mobile-y:204px;--r:-3deg;--d:-.5s;--bg:var(--white)">呃，你们懂吧</div>
          <div class="barrage" style="--x:8%;--y:166px;--mobile-y:258px;--r:3deg;--d:-1.7s;--bg:var(--green)">豪到你了？</div>
          <div class="barrage" style="--x:42%;--y:180px;--mobile-y:298px;--r:-1deg;--d:-2.6s;--bg:var(--blue)">今天不戴帽，豪意减半</div>
        </div>
      </section>

      <section class="screen" id="quizScreen">
        <div class="progress-wrap" aria-hidden="true"><div class="progress" id="progress"></div></div>
        <div class="question-card">
          <div class="question-head">
            <span id="questionCount">第 1 / 12 题</span>
            <span id="questionTag">课间观察</span>
          </div>
          <div class="question-body">
            <p class="question-text" id="questionText"></p>
            <div class="options" id="options"></div>
          </div>
        </div>
        <div class="nav-row">
          <button class="btn secondary" id="prevBtn">上一题</button>
          <button class="btn" id="nextBtn">下一题</button>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="result-layout">
          <article class="score-card">
            <div class="kicker">你的豪度</div>
            <div class="score" id="scoreText">0</div>
            <div class="score-label" id="scoreLabel">待鉴定</div>
            <div class="tag-row" id="evidenceTags"></div>
            <div id="resultArt"></div>
          </article>

          <article class="type-card">
            <div class="type-head">
              <span class="type-code" id="typeCode">HBTI</span>
              <h2 class="type-title" id="typeTitle">称号</h2>
            </div>
            <div class="type-body">
              <p class="quote" id="typeQuote"></p>
              <p id="typeDescription"></p>
              <div class="report-grid">
                <div class="report-item">
                  <strong>典型行为</strong>
                  <span id="typeBehavior"></span>
                </div>
                <div class="report-item">
                  <strong>朋友相处提示</strong>
                  <span id="typeTip"></span>
                </div>
                <div class="report-item">
                  <strong>代表语录</strong>
                  <span id="typeLine"></span>
                </div>
              </div>
              <div class="actions">
                <button class="btn" id="copyBtn">复制结果</button>
                <button class="btn secondary" id="openLibraryBtn">查看豪学图鉴</button>
                <button class="btn danger" id="restartBtn">重新鉴定</button>
              </div>
            </div>
          </article>

          <article class="breakdown">
            <h3>四维报告</h3>
            <div class="axis-grid" id="axisGrid"></div>
          </article>
        </div>
      </section>

      <section class="screen" id="libraryScreen">
        <div class="library-intro">
          <div>
            <h2>豪学图鉴</h2>
            <p class="lead">别人：正常走路。我：无人区慢放。</p>
            <p class="library-quote">豪到你了？呃，你们懂吧。今天不戴帽，豪意减半。我要去操控我的基金股票。</p>
          </div>
          <div class="actions">
            <button class="btn secondary" id="backFromLibraryBtn">返回</button>
            <button class="btn danger" id="startFromLibraryBtn">开始鉴定</button>
          </div>
        </div>
        <div class="library-grid" id="libraryGrid"></div>
      </section>
    </main>
  </div>

  <script>
    const axisNames = {
      hy: { H: "显豪", Y: "隐豪" },
      bw: { B: "本豪", W: "玩豪" },
      tn: { T: "体豪", N: "脑豪" },
      zr: { Z: "佐豪", R: "锐豪" }
    };

    const axisDescriptions = {
      hy: {

        description: "你不太表演，也不太承认，甚至可能觉得自己只是旁观者。但问题在于：你太懂怎么识别嘉豪了。知道太多，本身也是一种豪。你像豪学的反面教材，嘴上说不要，脑内已经建好分类表。",
        behavior: "最常说“别搞这些”，但别人问你类型时，你又能讲得头头是道。",
        tip: "朋友可以温柔提醒你：真正的路人不会懂这么多术语。",
        line: "别人：你懂好多。我：我只是被迫了解。",
        art: ["var(--pink)", "反向", "污染", "路人"]
      }
    };

    const typeImages = {
      HBTZ: "https://img2.baidu.com/it/u=2076921033,3340739903&fm=253&fmt=auto&app=120&f=JPEG?w=888&h=500",
      HBTR: "https://img2.baidu.com/it/u=3191902909,4072812609&fm=253&fmt=auto&app=120&f=JPEG?w=697&h=500",
      HBNZ: "https://img2.baidu.com/it/u=2943561891,3693203834&fm=253&fmt=auto&app=120&f=JPEG?w=888&h=500",
      HBNR: "https://img2.baidu.com/it/u=3858232171,306376565&fm=253&fmt=auto&app=120&f=JPEG?w=889&h=500",
      HWTZ: "https://img1.baidu.com/it/u=3379633509,2711978103&fm=253&fmt=auto&app=120&f=JPEG?w=667&h=500",
      HWTR: "https://img0.baidu.com/it/u=2210679749,1974087076&fm=253&fmt=auto&app=120&f=JPEG?w=889&h=500",
      HWNZ: "https://img0.baidu.com/it/u=904490372,2326681888&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500",
      HWNR: "https://img0.baidu.com/it/u=4248452887,651480593&fm=253&fmt=auto&app=120&f=JPEG?w=889&h=500",
      YBTZ: "https://img1.baidu.com/it/u=1122720008,859451929&fm=253&fmt=auto&app=120&f=JPEG?w=889&h=500",
      YBTR: "https://img1.baidu.com/it/u=88889113,911079158&fm=253&fmt=auto&app=120&f=JPEG?w=500&h=667",
      YBNZ: "https://img2.baidu.com/it/u=1004806087,3764816701&fm=253&fmt=auto&app=120&f=JPEG?w=667&h=500",
      YBNR: "https://img2.baidu.com/it/u=4161944225,3145464316&fm=253&fmt=auto&app=120&f=JPEG?w=889&h=500",
      YWTZ: "https://img1.baidu.com/it/u=404580750,1528835102&fm=253&fmt=auto&app=120&f=JPEG?w=520&h=500",
      YWTR: "https://img2.baidu.com/it/u=3643728659,2625757343&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1426",
      YWNZ: "https://img2.baidu.com/it/u=3462343814,2365437832&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=1242",
      YWNR: "https://img0.baidu.com/it/u=3065522155,1369389802&fm=253&fmt=auto&app=120&f=JPEG?w=889&h=500"
    };

    const state = {
      index: 0,
      answers: Array(questions.length).fill(null)
    };
    let lastResult = null;
    let previousScreen = "start";
    let currentScreen = "start";

    const startScreen = document.querySelector("#startScreen");
    const quizScreen = document.querySelector("#quizScreen");
    const resultScreen = document.querySelector("#resultScreen");
    const libraryScreen = document.querySelector("#libraryScreen");
    const progress = document.querySelector("#progress");
    const questionCount = document.querySelector("#questionCount");
    const questionTag = document.querySelector("#questionTag");
    const questionText = document.querySelector("#questionText");
    const optionsEl = document.querySelector("#options");
    const prevBtn = document.querySelector("#prevBtn");
    const nextBtn = document.querySelector("#nextBtn");
    const copyBtn = document.querySelector("#copyBtn");
    const libraryGrid = document.querySelector("#libraryGrid");

    renderLibrary();

    document.querySelector("#startBtn").addEventListener("click", () => {
      showScreen("quiz");
      renderQuestion();
    });

    document.querySelector("#openLibraryFromStartBtn").addEventListener("click", () => {
      previousScreen = "start";
      showScreen("library");
    });

    document.querySelector("#openLibraryBtn").addEventListener("click", () => {
      previousScreen = "result";
      showScreen("library");
    });

    document.querySelector("#backFromLibraryBtn").addEventListener("click", () => {
      showScreen(previousScreen === "result" && lastResult ? "result" : "start");
    });

    document.querySelector("#startFromLibraryBtn").addEventListener("click", () => {
      restartQuiz("quiz");
    });

    document.querySelector("#restartBtn").addEventListener("click", () => {
      restartQuiz("start");
    });

    libraryGrid.addEventListener("click", event => {
      if (event.target.closest("summary")) return;
      const card = event.target.closest(".library-card");
      if (!card) return;
      openLibraryResult(card.dataset.type);
    });

    copyBtn.addEventListener("click", async () => {
      if (!lastResult) return;
      const text = buildShareText(lastResult);
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "已复制";
      } catch (error) {
        fallbackCopy(text);
        copyBtn.textContent = "已复制";
      }
      setTimeout(() => {
        copyBtn.textContent = "复制结果";
      }, 1200);
    });

    prevBtn.addEventListener("click", () => {
      if (state.index > 0) {
        state.index -= 1;
        renderQuestion();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (state.answers[state.index] === null) {
        nextBtn.textContent = "先选一个";
        setTimeout(updateNav, 800);
        return;
      }
      if (state.index === questions.length - 1) {
        renderResult();
        showScreen("result");
      } else {
        state.index += 1;
        renderQuestion();
      }
    });

    function showScreen(name) {
      currentScreen = name;
      startScreen.classList.toggle("active", name === "start");
      quizScreen.classList.toggle("active", name === "quiz");
      resultScreen.classList.toggle("active", name === "result");
      libraryScreen.classList.toggle("active", name === "library");
      window.scrollTo(0, 0);
    }

    function restartQuiz(targetScreen) {
      state.index = 0;
      state.answers = Array(questions.length).fill(null);
      lastResult = null;
      if (targetScreen === "quiz") {
        showScreen("quiz");
        renderQuestion();
      } else {
        showScreen("start");
      }
    }

    function renderQuestion() {
      const question = questions[state.index];
      const selected = state.answers[state.index];
      questionCount.textContent = `第 ${state.index + 1} / ${questions.length} 题`;
      questionTag.textContent = question.tag;
      questionText.textContent = question.text;
      progress.style.width = `${(state.index / questions.length) * 100}%`;
      optionsEl.innerHTML = "";

      question.options.forEach((option, optionIndex) => {
        const button = document.createElement("button");
        button.className = `option${selected === optionIndex ? " selected" : ""}`;
        button.type = "button";
        button.innerHTML = `<span class="letter">${"ABCD"[optionIndex]}</span><span>${option[0]}</span>`;
        button.addEventListener("click", () => {
          state.answers[state.index] = optionIndex;
          renderQuestion();
        });
        optionsEl.appendChild(button);
      });

      updateNav();
    }

    function updateNav() {
      prevBtn.disabled = state.index === 0;
      prevBtn.classList.toggle("hidden", state.index === 0);
      nextBtn.textContent = state.index === questions.length - 1 ? "查看结果" : "下一题";
      progress.style.width = `${((state.index + (state.answers[state.index] !== null ? 1 : 0)) / questions.length) * 100}%`;
    }

    function renderResult() {
      const rawTotals = { hy: 0, bw: 0, tn: 0, zr: 0 };
      let rawScore = 0;
      const chosenTexts = [];

      state.answers.forEach((answerIndex, questionIndex) => {
        const selected = questions[questionIndex].options[answerIndex];
        rawScore += selected[1];
        chosenTexts.push(selected[0]);
        Object.entries(selected[2]).forEach(([axis, value]) => {
          rawTotals[axis] += value;
        });
      });

      const maxRawScore = questions.reduce((total, question) => {
        return total + Math.max(...question.options.map(option => option[1]));
      }, 0);
      const score = Math.round((rawScore / maxRawScore) * 100);
      const type = [
        rawTotals.hy >= 0 ? "H" : "Y",
        rawTotals.bw >= 0 ? "B" : "W",
        rawTotals.tn >= 0 ? "T" : "N",
        rawTotals.zr >= 0 ? "Z" : "R"
      ].join("");
      const canonicalResult = buildLibraryResult(type);
      applyResult({
        score,
        type,
        data: canonicalResult.data,
        totals: canonicalResult.totals,
        chosenTexts,
        rawTotals
      });
    }

    function applyResult(result) {
      lastResult = result;
      document.querySelector("#scoreText").textContent = result.score;
      document.querySelector("#scoreLabel").textContent = getScoreLabel(result.score);
      document.querySelector("#typeCode").textContent = `HBTI: ${result.type}`;
      document.querySelector("#typeTitle").textContent = result.data.title;
      document.querySelector("#typeQuote").textContent = result.data.quote;
      document.querySelector("#typeDescription").textContent = result.data.description;
      document.querySelector("#typeBehavior").textContent = result.data.behavior;
      document.querySelector("#typeTip").textContent = result.data.tip;
      document.querySelector("#typeLine").textContent = result.data.line;
      document.querySelector("#resultArt").innerHTML = renderMemeArt(result.type, result.data, false);

      renderTags(result.score, result.type, result.chosenTexts);
      renderAxes(result.type, result.totals);
    }

    function buildLibraryResult(type) {
      const data = typeData[type];
      const totals = {
        hy: type[0] === "H" ? 8 : -8,
        bw: type[1] === "B" ? 8 : -8,
        tn: type[2] === "T" ? 8 : -8,
        zr: type[3] === "Z" ? 8 : -8
      };
      const score = Math.max(18, Math.min(98,
        56
        + (type[0] === "H" ? 12 : -10)
        + (type[1] === "B" ? 14 : -8)
        + (type[2] === "T" ? 8 : -4)
        + (type[3] === "Z" ? 4 : 0)
      ));
      const chosenTexts = [];

      if (type.includes("T")) chosenTexts.push("虚空打碟");
      if (type.includes("R")) chosenTexts.push("豪学");

      return { score, type, data, totals, chosenTexts };
    }

    function openLibraryResult(type) {
      const result = buildLibraryResult(type);
      applyResult(result);
      showScreen("result");
    }

    function getScoreLabel(score) {
      if (score < 20) return "未检出明显豪味";
      if (score < 40) return "轻度豪友";
      if (score < 60) return "中度嘉豪化";
      if (score < 80) return "重度嘉豪化";
      return "赛级豪感预警";
    }

    function renderTags(score, type, chosenTexts) {
      const tags = document.querySelector("#evidenceTags");
      const evidence = [];
      if (score >= 70) evidence.push("走廊自带 BGM");
      if (type.includes("H")) evidence.push("外显登场");
      if (type.includes("Y")) evidence.push("暗中有味");
      if (type.includes("B")) evidence.push("真情实感");
      if (type.includes("W")) evidence.push("自知玩梗");
      if (chosenTexts.some(text => text.includes("虚空打碟"))) evidence.push("虚空打碟倾向");
      if (chosenTexts.some(text => text.includes("豪学"))) evidence.push("豪学污染");
      tags.innerHTML = evidence.slice(0, 5).map(tag => `<span class="tag">${tag}</span>`).join("");
    }

    function renderAxes(type, totals) {
      const axisGrid = document.querySelector("#axisGrid");
      const axes = [
        ["hy", type[0], "外显程度"],
        ["bw", type[1], "本真程度"],
        ["tn", type[2], "豪感来源"],
        ["zr", type[3], "社交姿态"]
      ];
      axisGrid.innerHTML = axes.map(([axis, letter, label]) => {
        const names = axisNames[axis];
        const description = axisDescriptions[axis][letter];
        const opposite = Object.keys(names).find(key => key !== letter);
        const strength = Math.min(100, Math.round((Math.abs(totals[axis]) / 12) * 100));
        return `
          <div class="axis">
            <strong>${letter} · ${names[letter]}</strong>
            <div class="axis-label">${label}</div>
            <div class="axis-meter">${names[letter]} ${strength}% / ${names[opposite]} ${100 - strength}%</div>
            <div class="axis-explain">${description}</div>
          </div>
        `;
      }).join("");
    }

    function renderMemeArt(type, data, compact) {
      const [bg, one, two, three] = data.art;
      const tilt = type.includes("H") ? "-3deg" : "3deg";
      const smallClass = compact ? " compact" : "";
      const image = typeImages[type];
      const imageClass = image ? " has-image" : "";
      const imageMarkup = image
        ? `<img class="meme-img" src="${escapeHtml(image)}" alt="${escapeHtml(data.title)}梗图" loading="lazy" referrerpolicy="no-referrer" onerror="this.hidden=true; this.parentElement.classList.remove('has-image')">`
        : "";
      return `
        <div class="meme-art${smallClass}${imageClass}" style="--art-bg:${bg};--tilt:${tilt}">
          ${imageMarkup}
          <div class="art-chip one">${escapeHtml(one)}</div>
          <div class="art-chip two">${escapeHtml(two)}</div>
          <div class="art-chip three">${escapeHtml(three)}</div>
          <div class="art-person" aria-hidden="true"></div>
        </div>
      `;
    }

    function renderLibrary() {
      libraryGrid.innerHTML = Object.entries(typeData).map(([type, data]) => `
        <article class="library-card" data-type="${type}">
          ${renderMemeArt(type, data, true)}
          <div class="library-card-body">
            <div class="type-code">HBTI: ${type}</div>
            <h3>${escapeHtml(data.title)}</h3>
            <p>${escapeHtml(data.quote)}</p>
            <details>
              <summary>展开报告</summary>
              <p>${escapeHtml(data.description)}</p>
              <p><strong>典型行为：</strong>${escapeHtml(data.behavior)}</p>
              <p><strong>代表语录：</strong>${escapeHtml(data.line)}</p>
            </details>
          </div>
        </article>
      `).join("");
    }

    function buildShareText(result) {
      return [
        `我的 HBTI 是 ${result.type}：${result.data.title}`,
        `豪度：${result.score}/100（${getScoreLabel(result.score)}）`,
        result.data.quote,
        `典型行为：${result.data.behavior}`,
        "来测测你到底有多豪。"
      ].join("\n");
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
